{namespace ex=Fixpunkt\Backendtools\ViewHelpers}
<html
    data-namespace-typo3-fluid="true"
    xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">
<f:layout name="Module"/>
<f:section name="Content">
    <f:asset.css href="EXT:backendtools/Resources/Public/Css/Backend.css" identifier="backendtools"/>
    <h1><f:translate key="title.fileadmin" /></h1>
    <f:flashMessages/>
    <f:form action="fileadmin" class="form-inline">
        <div style="margin: 10px 0;"><f:translate key="tx_backendtools_domain_model_session.pageel"/>:
            <f:form.textfield name="my_page" size="5" value="{my_page}"/> &nbsp;
        </div>
        <f:form.submit class="btn btn-default" name="search" value="{f:translate(key: 'search')}" />
        <div>&nbsp;</div>
    </f:form>
    <f:if condition="{files -> f:count()} > 0">
        <f:then>
            <f:if condition="{settings.pagebrowser.insertAbove} && ({paginator.numberOfPages} > 1)">
                <f:render arguments="{_all}" partial="Paginator"/>
            </f:if>

            <f:form action="fileadmin" class="form-inline">
                <f:form.hidden name="currentPage" value="{page}" />
                <table class="table">
                    <thead>
                    <tr>
                        <th style="color:#000;text-align:center;background-color:#cfc;">file</th>
                        <th style="color:#000;text-align:center;background-color:#cfc;">sys_file.uid</th>
                        <th style="color:#000;text-align:center;background-color:#cfc;">sys_file.missing</th>
                    </tr>
                    </thead>
                    <tbody>
                    <f:for as="file" each="{paginator.paginatedItems}" iteration="iterator">
                        <tr>
                            <td>{file.identifier}</td>
                            <td>{file.uid}</td>
                            <td>{file.missing}</td>
                        </tr>
                    </f:for>
                    </tbody>
                </table>

                <p>{files -> f:count()} <f:translate key="not_image_entries"/></p>

                <br><br>
            </f:form>

            <f:if condition="{settings.pagebrowser.insertBelow} && ({paginator.numberOfPages} > 1)">
                <f:render arguments="{_all}" partial="Paginator"/>
            </f:if>
        </f:then>
        <f:else>
            <p>0 <f:translate key="not_image_entries"/></p>
        </f:else>
    </f:if>
</f:section>
</html>
